<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURON Admin Dashboard</title>
    
    <link rel="apple-touch-icon" href="https://github.com/neuron-workplace/neuron_students/blob/main/LOGO.png?raw=true">
    <link rel="icon" type="image/png" href="https://github.com/neuron-workplace/euron_students/blob/main/LOGO.png?raw=true">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            /* Brand Colors */
            --primary-color: #004a99;
            --primary-light: #e6f0fa;
            
            /* UI Colors */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Header Styles */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        .header img {
            width: 88px;
            height: 88px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 16px;
            object-fit: cover;
            background: white;
        }

        .header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.6s ease-out;
        }

        /* Card Styles */
        .nav-card {
            background: var(--card-bg);
            padding: 24px 20px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle top border accent on hover */
        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Hover States */
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border-color: transparent;
        }

        .nav-card:hover::before {
            opacity: 1;
        }

        .nav-card:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Icon Styling */
        .icon-wrapper {
            background: var(--primary-light);
            color: var(--primary-color);
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            transition: transform 0.3s ease;
        }

        .nav-card:hover .icon-wrapper {
            transform: scale(1.1);
        }

        .label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* Simple Load Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive fallback for very small phones */
        @media (max-width: 360px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://github.com/neuron-workplace/euron_students/blob/main/LOGO.png?raw=true" alt="Neuron Logo">
        <h2>NEURON Management</h2>
        <p>Admin Dashboard</p>
    </div>

    <div class="grid">
        <a href="results.html" class="nav-card">
            <div class="icon-wrapper">
                <i class="ph ph-paper-plane-right"></i>
            </div>
            <div class="label">Send Results</div>
        </a>

        <a href="addmission_form.html" class="nav-card">
            <div class="icon-wrapper">
                <i class="ph ph-clipboard-text"></i>
            </div>
            <div class="label">Addmission Form</div>
        </a>
    </div>

</body>
</html>
